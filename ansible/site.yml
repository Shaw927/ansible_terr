---
- name: Setup ClickHouse
  hosts: clickhouse
  become: true
  vars:
    clickhouse_version: "24.8.4.13"
  tags: clickhouse

  handlers:
    - name: start clickhouse service
      service:
        name: clickhouse-server
        state: restarted
        enabled: true
      tags: [clickhouse, service]

  tasks:
    - name: Install prerequisite packages
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
        state: present
        update_cache: true
      tags: [clickhouse, distr]

    - name: Download ClickHouse GPG key
      get_url:
        url: "https://packages.clickhouse.com/rpm/lts/repodata/repomd.xml.key"
        dest: "/tmp/clickhouse-key.gpg"
        mode: "0644"
      tags: [clickhouse, distr]

    - name: Dearmor ClickHouse GPG key
      shell: >
        gpg --dearmor --yes
        --output /usr/share/keyrings/clickhouse-keyring.gpg
        /tmp/clickhouse-key.gpg
      args:
        creates: /usr/share/keyrings/clickhouse-keyring.gpg
      tags: [clickhouse, distr]

    - name: Add ClickHouse apt repository
      apt_repository:
        repo: "deb [signed-by=/usr/share/keyrings/clickhouse-keyring.gpg] https://packages.clickhouse.com/deb stable main"
        filename: clickhouse
        state: present
        update_cache: true
      tags: [clickhouse, distr]

    - name: Install clickhouse packages (pinned version)
      apt:
        name:
          - "clickhouse-common-static={{ clickhouse_version }}"
          - "clickhouse-server={{ clickhouse_version }}"
          - "clickhouse-client={{ clickhouse_version }}"
        state: present
        update_cache: true
      notify: start clickhouse service
      tags: [clickhouse, distr]

    - name: Flush handlers
      meta: flush_handlers
      tags: [clickhouse, service]

    - name: Wait for clickhouse-server to be ready
      wait_for:
        port: 9000
        timeout: 30
      tags: [clickhouse, service]

- name: Setup Vector
  hosts: vector
  become: true
  vars:
    vector_version: "0.42.0"
    vector_arch: "x86_64"
    vector_config_path: "/etc/vector/vector.yaml"
  tags: vector

  handlers:
    - name: restart vector service
      service:
        name: vector
        state: restarted
        enabled: true
      tags: [vector, service]

  tasks:
    - name: Get vector distrib
      get_url:
        url: "https://packages.timber.io/vector/{{ vector_version }}/vector-{{ vector_version }}-{{ vector_arch }}-unknown-linux-gnu.tar.gz"
        dest: "/tmp/vector.tar.gz"
        mode: "0644"
      tags: [vector, distr]

    - name: Ensure unarchive dependencies present
      apt:
        name: tar
        state: present
        update_cache: true
      tags: [vector, distr]

    - name: Unpack vector distrib
      unarchive:
        src: "/tmp/vector.tar.gz"
        dest: "/opt/"
        remote_src: true
        creates: "/opt/vector-{{ vector_arch }}-unknown-linux-gnu"
      tags: [vector, distr]

    - name: Symlink vector binary
      file:
        src: "/opt/vector-{{ vector_arch }}-unknown-linux-gnu/bin/vector"
        dest: "/usr/local/bin/vector"
        state: link
      tags: [vector, distr]

    - name: Ensure config directory exists
      file:
        path: "/etc/vector"
        state: directory
        mode: "0755"
      tags: [vector, config]

    - name: Deploy vector configuration
      template:
        src: vector.yaml.j2
        dest: "{{ vector_config_path }}"
        mode: "0644"
      notify: restart vector service
      tags: [vector, config]

    - name: Create vector systemd unit
      copy:
        dest: /etc/systemd/system/vector.service
        content: |
          [Unit]
          Description=Vector
          After=network.target

          [Service]
          ExecStart=/usr/local/bin/vector --config {{ vector_config_path }}
          Restart=on-failure

          [Install]
          WantedBy=multi-user.target
        mode: "0644"
      notify: restart vector service
      tags: [vector, config]

    - name: Flush handlers
      meta: flush_handlers
      tags: [vector, service]

- name: Install and configure LightHouse
  hosts: lighthouse
  become: true
  vars:
    lighthouse_version: "master"
    lighthouse_web_root: "/var/www/lighthouse"
    lighthouse_zip_url: "https://github.com/VKCOM/lighthouse/archive/refs/heads/{{ lighthouse_version }}.zip"
    lighthouse_http_port: 8080
    nginx_conf_path: "/etc/nginx/sites-available/lighthouse.conf"
    nginx_conf_link: "/etc/nginx/sites-enabled/lighthouse.conf"
  tags: lighthouse

  handlers:
    - name: reload nginx
      service:
        name: nginx
        state: reloaded
      tags: [lighthouse, service]

  tasks:
    - name: Install nginx and unzip
      apt:
        name:
          - nginx
          - unzip
        state: present
        update_cache: true
      tags: [lighthouse, packages]

    - name: Create web root directory
      file:
        path: "{{ lighthouse_web_root }}"
        state: directory
        owner: www-data
        group: www-data
        mode: "0755"
      tags: [lighthouse, config]

    - name: Download LightHouse static archive
      get_url:
        url: "{{ lighthouse_zip_url }}"
        dest: "/tmp/lighthouse.zip"
        mode: "0644"
      tags: [lighthouse, download]

    - name: Unpack LightHouse archive
      unarchive:
        src: "/tmp/lighthouse.zip"
        dest: "/tmp/"
        remote_src: true
        creates: "/tmp/lighthouse-{{ lighthouse_version }}"
      tags: [lighthouse, download]

    - name: Sync LightHouse static files to web root
      copy:
        src: "/tmp/lighthouse-{{ lighthouse_version }}/"
        dest: "{{ lighthouse_web_root }}/"
        remote_src: true
        owner: www-data
        group: www-data
        mode: "0644"
        directory_mode: "0755"
      tags: [lighthouse, config]

    - name: Deploy nginx config for LightHouse
      template:
        src: lighthouse_nginx.conf.j2
        dest: "{{ nginx_conf_path }}"
        owner: root
        group: root
        mode: "0644"
      notify: reload nginx
      tags: [lighthouse, config]

    - name: Remove default nginx site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent
      notify: reload nginx
      tags: [lighthouse, config]

    - name: Enable LightHouse nginx site
      file:
        src: "{{ nginx_conf_path }}"
        dest: "{{ nginx_conf_link }}"
        state: link
      notify: reload nginx
      tags: [lighthouse, config]

    - name: Ensure nginx is enabled and running
      service:
        name: nginx
        state: started
        enabled: true
      tags: [lighthouse, service]
